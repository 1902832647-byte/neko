<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฅ^•ﻌ•^ฅ 小夜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  :root{
    --cream:#fdf6ec;--pink:#f2a7c3;--pink-dark:#e8789f;
    --lavender:#c9b8e8;--mint:#b8e8d4;--dark:#2d2340;
    --shadow:rgba(200,150,180,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Nunito',sans-serif;background:var(--cream);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:20px;overflow-x:hidden;
    background-image:
      radial-gradient(circle at 20% 20%,rgba(242,167,195,.15) 0%,transparent 50%),
      radial-gradient(circle at 80% 80%,rgba(201,184,232,.15) 0%,transparent 50%);
  }
  .deco{position:fixed;pointer-events:none;font-size:1.1rem;opacity:.2;animation:flt 6s ease-in-out infinite}
  .deco:nth-child(1){top:5%;left:5%}
  .deco:nth-child(2){top:15%;right:8%;animation-delay:1.5s}
  .deco:nth-child(3){bottom:20%;left:3%;animation-delay:3s}
  .deco:nth-child(4){bottom:10%;right:5%;animation-delay:4.5s}
  @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  h1{font-size:1.8rem;font-weight:900;color:var(--dark);margin-bottom:2px;letter-spacing:-.5px}
  .subtitle{font-size:.82rem;color:var(--pink-dark);font-weight:700;margin-bottom:14px;letter-spacing:.5px}

  /* ── AFFECTION BAR ── */
  .affection-wrap{
    width:100%;max-width:480px;background:white;border-radius:20px;
    padding:10px 16px;margin-bottom:12px;
    box-shadow:0 2px 12px var(--shadow);
    display:flex;align-items:center;gap:10px;
  }
  .affection-label{font-size:.78rem;font-weight:800;color:var(--dark);white-space:nowrap}
  .affection-bar-wrap{flex:1;height:10px;background:#f0e6f0;border-radius:6px;overflow:hidden}
  .affection-bar{height:100%;border-radius:6px;background:linear-gradient(90deg,#f9c8d8,#e8789f,#c9b8e8);transition:width .6s ease}
  #affection-hearts{font-size:.85rem;white-space:nowrap}

  /* ── STATUS ── */
  .status-bar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
  .stat{background:white;border-radius:20px;padding:6px 14px;display:flex;align-items:center;gap:6px;
    box-shadow:0 2px 10px var(--shadow);font-size:.78rem;font-weight:700;color:var(--dark)}
  .stat-bar-wrap{width:52px;height:7px;background:#f0e6f0;border-radius:4px;overflow:hidden}
  .stat-bar{height:100%;border-radius:4px;transition:width .5s ease}
  .bar-happy{background:linear-gradient(90deg,#f2a7c3,#e8789f)}
  .bar-hungry{background:linear-gradient(90deg,#fdeaa8,#f5c842)}
  .bar-clean{background:linear-gradient(90deg,#b8e8d4,#5ecfa0)}
  .bar-energy{background:linear-gradient(90deg,#c9b8e8,#9b7fd4)}

  /* ── GAME WORLD ── */
  .game-world{width:100%;max-width:480px;background:white;border-radius:28px;padding:16px;
    box-shadow:0 8px 40px var(--shadow),0 0 0 3px rgba(242,167,195,.3);margin-bottom:12px}
  .room-label{font-size:.7rem;font-weight:800;color:var(--pink-dark);text-transform:uppercase;
    letter-spacing:2px;text-align:center;margin-bottom:8px}

  #cat-arena{
    width:100%;height:230px;
    background:linear-gradient(180deg,#fce8f5 0%,#fdf0f8 65%,#f8e8e0 100%);
    border-radius:20px;position:relative;overflow:hidden;cursor:pointer;
    border:2px solid rgba(242,167,195,.35);user-select:none;
  }
  .arena-deco{position:absolute;font-size:1.3rem;pointer-events:none;opacity:.45}

  #cat-wrap{
    position:absolute;cursor:pointer;
    transition:left .7s cubic-bezier(.34,1.3,.64,1),top .7s cubic-bezier(.34,1.3,.64,1);
    display:flex;flex-direction:column;align-items:center;line-height:1;
  }
  #cat-face{
    font-size:1.85rem;display:block;
    transition:transform .15s;
    filter:drop-shadow(0 2px 6px rgba(200,130,170,.3));
    white-space:nowrap;
  }

  @keyframes idleBob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(2deg)}}
  @keyframes walkWiggle{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-4px) rotate(5deg)}}
  @keyframes purrBounce{0%,100%{transform:scale(1) rotate(0)}33%{transform:scale(1.1) rotate(-4deg)}66%{transform:scale(1.1) rotate(4deg)}}
  @keyframes fluffShake{0%,100%{transform:rotate(0) scale(1)}20%{transform:rotate(-18deg) scale(1.25)}40%{transform:rotate(18deg) scale(1.3)}60%{transform:rotate(-12deg) scale(1.2)}80%{transform:rotate(10deg) scale(1.1)}}
  @keyframes waterGun{0%{transform:translateX(0)}20%{transform:translateX(-8px) rotate(-10deg)}50%{transform:translateX(12px) rotate(8deg)}75%{transform:translateX(-6px) rotate(-5deg)}100%{transform:translateX(0) rotate(0)}}
  @keyframes angryShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
  @keyframes giftBounce{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.15) translateY(-8px)}}

  .anim-idle  #cat-face{animation:idleBob 2s ease-in-out infinite}
  .anim-walk  #cat-face{animation:walkWiggle .35s ease-in-out infinite}
  .anim-purr  #cat-face{animation:purrBounce .5s ease-in-out infinite}
  .anim-fluff #cat-face{animation:fluffShake .5s ease forwards}
  .anim-water #cat-face{animation:waterGun .4s ease}
  .anim-angry #cat-face{animation:angryShake .3s ease-in-out 3}
  .anim-gift  #cat-face{animation:giftBounce .6s ease-in-out 3}

  /* thought */
  .thought{
    position:absolute;top:-38px;left:50%;transform:translateX(-50%);
    background:white;border-radius:12px;padding:3px 10px;
    font-size:.65rem;font-weight:800;color:var(--dark);
    white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;
    box-shadow:0 2px 8px rgba(0,0,0,.1);border:1.5px solid rgba(242,167,195,.5);z-index:10;
  }
  .thought::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
    border-left:5px solid transparent;border-right:5px solid transparent;border-top:6px solid white}
  .thought.show{opacity:1}

  #mood-msg{text-align:center;font-size:.8rem;font-weight:700;color:var(--pink-dark);margin-top:10px;min-height:20px}

  /* ── GIFT POPUP ── */
  #gift-popup{
    display:none;position:fixed;inset:0;z-index:500;
    background:rgba(45,35,64,.45);backdrop-filter:blur(4px);
    align-items:center;justify-content:center;
  }
  #gift-popup.show{display:flex}
  .gift-box{
    background:white;border-radius:28px;padding:28px 32px;text-align:center;
    box-shadow:0 20px 60px rgba(200,130,170,.4);
    animation:giftBoxIn .5s cubic-bezier(.34,1.56,.64,1);
    max-width:300px;
  }
  @keyframes giftBoxIn{from{transform:scale(.5) rotate(-10deg);opacity:0}to{transform:none;opacity:1}}
  .gift-box h2{font-size:1.3rem;font-weight:900;color:var(--dark);margin-bottom:6px}
  .gift-item{font-size:3.5rem;margin:12px 0;animation:giftBounce .6s ease-in-out infinite}
  .gift-desc{font-size:.82rem;font-weight:700;color:#888;margin-bottom:18px}
  .gift-close{
    background:linear-gradient(135deg,#fde8f0,#fcd0e4);border:none;border-radius:14px;
    padding:10px 24px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;
    color:var(--dark);cursor:pointer;transition:transform .2s;
  }
  .gift-close:hover{transform:scale(1.05)}

  /* ── BUTTONS ── */
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:480px;margin-bottom:12px}
  .btn{
    background:white;border:none;border-radius:18px;padding:13px 8px;
    font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;color:var(--dark);
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
    box-shadow:0 3px 15px var(--shadow);transition:all .2s cubic-bezier(.34,1.56,.64,1);
  }
  .btn:hover{transform:translateY(-3px) scale(1.03)}
  .btn:active{transform:scale(.95)}
  .btn-emoji{font-size:1.2rem}
  .btn-pet{background:linear-gradient(135deg,#fde8f0,#fcd0e4)}
  .btn-feed{background:linear-gradient(135deg,#fef9e0,#fdeaa8)}
  .btn-play{background:linear-gradient(135deg,#e8f0fe,#c9d8fc)}
  .btn-bath{background:linear-gradient(135deg,#e8fef5,#b8e8d4)}
  .btn-gun{background:linear-gradient(135deg,#e8f4fe,#b8d8f8)}

  /* ── DIARY ── */
  .diary-wrap{width:100%;max-width:480px;background:white;border-radius:24px;padding:16px;
    box-shadow:0 4px 20px var(--shadow);border:2px solid rgba(201,184,232,.3)}
  .diary-title{font-size:.9rem;font-weight:900;color:var(--dark);margin-bottom:10px}
  #diary-list{list-style:none;display:flex;flex-direction:column;gap:6px;
    max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--pink) transparent}
  #diary-list::-webkit-scrollbar{width:4px}
  #diary-list::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px}
  .diary-entry{background:var(--cream);border-radius:12px;padding:7px 11px;
    font-size:.74rem;font-weight:600;color:var(--dark);display:flex;align-items:flex-start;gap:8px;
    animation:slideIn .35s cubic-bezier(.34,1.56,.64,1)}
  .diary-entry.rare{background:linear-gradient(135deg,#fff8e1,#ffeaa0);border-left:3px solid #f5c842}
  .diary-entry.gift-entry{background:linear-gradient(135deg,#fde8f0,#fcd0e4);border-left:3px solid var(--pink)}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .diary-time{font-size:.63rem;color:var(--pink-dark);white-space:nowrap;margin-top:1px}

  /* popup emoji */
  .popup-effect{position:fixed;pointer-events:none;font-size:1.8rem;
    animation:popFloat 1s ease forwards;z-index:999}
  @keyframes popFloat{0%{opacity:1;transform:translateY(0) scale(.4)}50%{opacity:1;transform:translateY(-50px) scale(1.3)}100%{opacity:0;transform:translateY(-90px) scale(.9)}}

  /* drop item float */
  .drop-item{position:fixed;pointer-events:none;font-size:2rem;
    animation:dropFloat 2s ease forwards;z-index:998}
  @keyframes dropFloat{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(.6)}30%{opacity:1;transform:translateY(-30px) rotate(-15deg) scale(1.2)}70%{opacity:1;transform:translateY(-20px) rotate(10deg) scale(1.1)}100%{opacity:0;transform:translateY(40px) rotate(25deg) scale(.8)}}
</style>
</head>
<body>

<div class="deco">🌸</div>
<div class="deco">⭐</div>
<div class="deco">🍓</div>
<div class="deco">🌙</div>

<h1>ฅ^•ﻌ•^ฅ 小夜</h1>
<p class="subtitle">我的像素猫咪 · pixel neko</p>

<!-- AFFECTION BAR -->
<div class="affection-wrap">
  <div class="affection-label">💝 好感度</div>
  <div class="affection-bar-wrap">
    <div class="affection-bar" id="aff-bar" style="width:30%"></div>
  </div>
  <div id="affection-hearts">🤍🤍🤍🤍🤍</div>
</div>

<div class="status-bar">
  <div class="stat">💗<div class="stat-bar-wrap"><div class="stat-bar bar-happy"  id="bar-happy"  style="width:80%"></div></div></div>
  <div class="stat">🍣<div class="stat-bar-wrap"><div class="stat-bar bar-hungry" id="bar-hungry" style="width:60%"></div></div></div>
  <div class="stat">✨<div class="stat-bar-wrap"><div class="stat-bar bar-clean"  id="bar-clean"  style="width:90%"></div></div></div>
  <div class="stat">⚡<div class="stat-bar-wrap"><div class="stat-bar bar-energy" id="bar-energy" style="width:70%"></div></div></div>
</div>

<div class="game-world">
  <div class="room-label">🏠 小夜的小屋</div>
  <div id="cat-arena">
    <span class="arena-deco" style="left:8px;bottom:22px">🪴</span>
    <span class="arena-deco" style="right:8px;bottom:22px">🧸</span>
    <span class="arena-deco" style="left:50%;bottom:18px;transform:translateX(-50%)">🐾</span>
    <div id="cat-wrap" class="anim-idle">
      <div class="thought" id="thought-bubble"></div>
      <span id="cat-face">(=^･ω･^=)</span>
    </div>
  </div>
  <div id="mood-msg">小夜正在悠闲地四处逛~</div>
</div>

<div class="actions">
  <button class="btn btn-pet"  onclick="doAction('pet')"><span class="btn-emoji">🤍</span> 摸摸</button>
  <button class="btn btn-feed" onclick="doAction('feed')"><span class="btn-emoji">🍣</span> 喂饭</button>
  <button class="btn btn-play" onclick="doAction('play')"><span class="btn-emoji">🎀</span> 一起玩</button>
  <button class="btn btn-bath" onclick="doAction('bath')"><span class="btn-emoji">🛁</span> 洗澡澡</button>
  <button class="btn btn-gun"  onclick="doAction('gun')" style="grid-column:1/-1"><span class="btn-emoji">🔫</span> 用水枪滋它一下</button>
</div>

<div class="diary-wrap">
  <div class="diary-title">📓 小夜的日记</div>
  <ul id="diary-list"></ul>
</div>

<!-- GIFT POPUP -->
<div id="gift-popup">
  <div class="gift-box">
    <h2>🎁 小夜送你礼物！</h2>
    <div class="gift-item" id="gift-item-display">🐀</div>
    <div class="gift-desc" id="gift-desc">小夜叼着东西跑过来，骄傲地放在你面前！</div>
    <button class="gift-close" onclick="closeGift()">谢谢小夜！♡</button>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────
const state={happy:80,hungry:60,clean:90,energy:70,busy:false,affection:30,maxAff:100,giftGiven:false};

// ── CAT FACES ─────────────────────────────────────────
const FACES={
  idle:  ['(=^･ω･^=)','ฅ(^•ﻌ•^ฅ)','(=^‥^=)','(^･o･^)ﾉ"','( ´◔ ω◔`)'],
  happy: ['(=^▽^=)','(＾• ω •＾)♡','ฅ(≧▽≦)ฅ','(*^ω^*)','(=｀ω´=)♡'],
  walk:  ['(=^･o･^=)ﾉ','ε=ε=(=^･ω･^=)','~(=^‥^)/','(=^･ｪ･^=)ﾉ彡'],
  fluff: ['(=ΦエΦ=)!!','(ΦДΦ)!!','ฅ(ΦωΦ)ฅ!!','(=ＴェＴ=)!!','(ฅ`ω´ฅ)!!'],
  feed:  ['( ˙༥˙ )ﾓｸﾞﾓｸﾞ','(=^ｪ^=)♪','(^•ω•^∥)🐟','(≧ヮ≦)ﾓｸﾞ'],
  pet:   ['(=^‥^=)♡','(≧ω≦)ぐるぐる','ฅ(*ΦωΦ*)ฅ','(=^ｪ^=)~~♪'],
  play:  ['ε=ε=ε=(=^･ω･^=)','(=^▽^=)ﾉ🎀','ฅ(^•ω•^ฅ)ﾉ','(=^○○^=)！'],
  bath:  ['(=；ω；=)ﾔﾀﾞ','(≧Дﾐ)ﾔﾀﾞ','(=ＴェＴ=)...','(=｀Дﾐ)ｲﾔｧ'],
  gun:   ['( ･᷄ὢ･᷅ )🔪','(=ΦエΦ=)🔪','(ฅ`ω´ฅ)🔪','(≧Дﾐ)🔪'],
  angry: ['( ･᷄ὢ･᷅ )','(=｀ω´=)...','(ΦωΦ)ﾌﾝ','(=｀ェ´=)'],
  gift:  ['(=^▽^=)🎁','(≧ω≦)ﾄﾞｳｿﾞ！','ฅ(^•ﻌ•^ฅ)♡'],
  hungry:['(´•ω•`)ﾊﾗﾍﾀ','(=^‥^=)...ﾊﾗﾍﾀ','( ˙༥˙ )...'],
  maxaff:['(=^▽^=)♡♡♡','ฅ(*ΦωΦ*)ฅ♡','(≧ω≦)大好き！'],
};

// ── GIFT DROPS ────────────────────────────────────────
const GIFTS=[
  {item:'🐀',desc:'小夜骄傲地叼来一只老鼠，放在你脚边……',rare:false},
  {item:'🐍',desc:'小夜带来了一条蛇，尾巴还在动……',rare:false},
  {item:'🦇',desc:'小夜拍拍翅膀，送来了一只蝙蝠！',rare:false},
  {item:'🪳',desc:'小夜用爪子推来了一只大蟑螂……',rare:false},
  {item:'🐛',desc:'小夜送来了一条毛毛虫，感觉很得意',rare:false},
  {item:'🦎',desc:'小夜叼着蜥蜴跑来，骄傲地放在你面前！',rare:false},
  {item:'💴',desc:'！？小夜不知道从哪里叼来了钱！！',rare:true},
  {item:'💎',desc:'！？小夜叼来了一颗钻石……这是哪里来的？！',rare:true},
];

function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

const catWrap=document.getElementById('cat-wrap');
const catFace=document.getElementById('cat-face');
const arena=document.getElementById('cat-arena');
const thoughtEl=document.getElementById('thought-bubble');
const moodMsg=document.getElementById('mood-msg');

function setFace(mood){catFace.textContent=rnd(FACES[mood]||FACES.idle);}
function setAnim(a){catWrap.className='';catWrap.classList.add('anim-'+a);}

// ── AFFECTION ─────────────────────────────────────────
function changeAff(d){
  state.affection=Math.max(0,Math.min(state.maxAff,state.affection+d));
  const pct=state.affection/state.maxAff*100;
  document.getElementById('aff-bar').style.width=pct+'%';
  // hearts display 5 stages
  const filled=Math.round(pct/20);
  document.getElementById('affection-hearts')='💗'.repeat(filled)+'🤍'.repeat(5-filled);
  document.getElementById('affection-hearts').textContent='💗'.repeat(filled)+'🤍'.repeat(5-filled);

  // MAX affection!
  if(state.affection>=state.maxAff && !state.giftGiven){
    state.giftGiven=true;
    setTimeout(triggerGift,800);
  }
}

function triggerGift(){
  state.busy=true;
  setFace('gift');
  setAnim('gift');
  moodMsg.textContent='小夜跑过来，在你脚边放下了什么……';
  showThought('(=^▽^=)🎁');

  // pick gift — 5% chance rare
  let pool=Math.random()<0.05 ? GIFTS.filter(g=>g.rare) : GIFTS.filter(g=>!g.rare);
  if(!pool.length) pool=GIFTS;
  const gift=rnd(pool);

  setTimeout(()=>{
    const popup=document.getElementById('gift-popup');
    document.getElementById('gift-item-display').textContent=gift.item;
    document.getElementById('gift-desc').textContent=gift.desc;
    popup.classList.add('show');
    addDiary(gift.desc + ' ' + gift.item, 'gift-entry');
    if(gift.rare) addDiary('（稀有礼物！！）', 'rare');
    hideThought();
    state.busy=false;
  },1200);
}

function closeGift(){
  document.getElementById('gift-popup').classList.remove('show');
  state.giftGiven=false; // allow future gifts
  state.affection=80; // reset a bit so they can fill again
  changeAff(0);
  setFace('idle');setAnim('idle');
  moodMsg.textContent='小夜满足地打了个哈欠~';
}

// ── MOVEMENT ──────────────────────────────────────────
let catX=0,catY=0;
function moveCat(){
  if(state.busy)return;
  const pad=10;
  const maxX=arena.clientWidth-catWrap.offsetWidth-pad;
  const maxY=arena.clientHeight-catWrap.offsetHeight-pad;
  const nx=pad+Math.random()*maxX;
  const ny=pad+Math.random()*maxY;
  catFace.style.transform=nx<catX?'scaleX(-1)':'scaleX(1)';
  catX=nx;catY=ny;
  catWrap.style.left=nx+'px';catWrap.style.top=ny+'px';
  setAnim('walk');setFace('walk');
  setTimeout(()=>{setAnim('idle');setFace('idle');},700);
}
function init(){
  catX=arena.clientWidth/2-50;catY=arena.clientHeight/2-20;
  catWrap.style.left=catX+'px';catWrap.style.top=catY+'px';
  setFace('idle');setAnim('idle');changeAff(0);
  setTimeout(moveCat,1000);
  setInterval(()=>{if(!state.busy)moveCat();},2800+Math.random()*1500);
}

// ── CLICK CAT ─────────────────────────────────────────
catWrap.addEventListener('click',e=>{
  e.stopPropagation();
  if(state.busy)return;
  if(Math.random()<0.2){doFluff();return;}
  const b=['nya~','♡','purr...','mew!','zzz~','(=^ω^=)','ふにゃ~'];
  showThought(rnd(b));
  setFace('pet');setAnim('purr');showBlush();
  changeStat('happy',4);changeAff(3);
  addDiary('小夜被摸了摸，咕噜咕噜地叫起来 🐾');
  state.busy=true;
  setTimeout(()=>{setFace('idle');setAnim('idle');hideBlush();state.busy=false;},1300);
});

function doFluff(){
  state.busy=true;
  setFace('fluff');setAnim('fluff');
  showThought('!!(ΦДΦ)!!');
  changeStat('happy',-5);changeAff(-8); // 炸毛扣好感！
  addDiary('小夜突然炸毛，蓬蓬地跑开了 💨（好感度↓）');
  moodMsg.textContent='小夜炸毛啦！！(ΦДΦ)';
  spawnEmoji('💥');
  setTimeout(()=>{
    moveCat();state.busy=false;hideThought();
    moodMsg.textContent='小夜冷静下来了...（有点不开心）';
    setFace('angry');
    setTimeout(()=>setFace('idle'),2000);
  },950);
}

// ── BLUSH ─────────────────────────────────────────────
function showBlush(){catFace.style.textShadow='0 0 10px rgba(249,168,200,.9),2px 2px 0 rgba(249,168,200,.5)';}
function hideBlush(){catFace.style.textShadow='';}

// ── THOUGHT ───────────────────────────────────────────
let tTimer;
function showThought(t){thoughtEl.textContent=t;thoughtEl.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(hideThought,2500);}
function hideThought(){thoughtEl.classList.remove('show');}

// ── ACTIONS ───────────────────────────────────────────
const MSGS={
  pet:  ['小夜咕噜咕噜地叫起来 ♡','哇！好舒服～（蹭蹭）','小夜的尾巴翘得高高的~'],
  feed: ['小夜把食物吃得干干净净！( ˙༥˙ )ﾓｸﾞﾓｸﾞ','喵～好好吃！最爱吃鱼了！','小夜吃饱了，打了个小嗝~ ♡'],
  play: ['小夜扑向了小毛球！','小夜追着蝴蝶结跑来跑去！','哇！好好玩！（蹦蹦跳跳）'],
  bath: ['小夜洗完澡，现在香喷喷的！','哼哼～（勉强接受了洗澡）','洗完澡小夜毛发亮亮的~'],
  gun:  ['小夜被水枪滋了一下！！','水！！！小夜炸毛了！！','小夜：你完了。( ･᷄ὢ･᷅ )🔪'],
};
const EMOJIS={pet:'💗',feed:'🍣',play:'🎀',bath:'🫧',gun:'🔫'};
const DELTA={
  pet:  {stat:{happy:+12,energy:-2},aff:+8},
  feed: {stat:{hungry:+20,happy:+5,energy:+8},aff:+6},
  play: {stat:{happy:+15,energy:-10,hungry:-8},aff:+10},
  bath: {stat:{clean:+25,happy:+3},aff:+4},
  gun:  {stat:{happy:-15},aff:-15},
};

function doAction(action){
  if(state.busy)return;
  state.busy=true;
  spawnEmoji(EMOJIS[action]);
  const msg=rnd(MSGS[action]);
  moodMsg.textContent=msg;
  addDiary(msg);
  const d=DELTA[action]||{};
  for(const[k,v]of Object.entries(d.stat||{})) changeStat(k,v);
  changeAff(d.aff||0);

  if(action==='gun'){
    // water gun — cat goes angry with knife!
    setFace('gun');setAnim('water');
    showThought('( ･᷄ὢ･᷅ )🔪');
    setTimeout(()=>{
      setAnim('angry');
      setTimeout(()=>{
        moveCat();state.busy=false;
        moodMsg.textContent='小夜非常生气！（好感度↓↓）';
        setFace('angry');
        setTimeout(()=>{setFace('idle');setAnim('idle');},2500);
      },700);
    },600);
  } else if(action==='bath'){
    setFace('bath');setAnim('fluff');
    showThought(rnd(['ﾔﾀﾞ(=；ω；=)','(≧Дﾐ)ｲﾔｧ']));
    setTimeout(()=>{setFace('idle');setAnim('idle');showBlush();
      setTimeout(hideBlush,800);state.busy=false;moodMsg.textContent='小夜心情很好～（香喷喷）';},1400);
  } else if(action==='feed'){
    setFace('feed');setAnim('purr');showBlush();
    showThought('( ˙༥˙ )ﾓｸﾞﾓｸﾞ');
    // random drop?
    if(Math.random()<0.12) setTimeout(dropRandomItem,600);
    setTimeout(()=>{setFace('idle');setAnim('idle');hideBlush();state.busy=false;moodMsg.textContent='小夜吃饱啦～';},1500);
  } else {
    setFace(action);setAnim(action==='play'?'walk':'purr');
    if(action!=='play') showBlush();
    showThought(EMOJIS[action]);
    setTimeout(()=>{setFace('idle');setAnim('idle');hideBlush();state.busy=false;moodMsg.textContent='小夜心情很好～';},1400);
  }
}

// ── RANDOM DROP (after playing/feeding sometimes) ──────
function dropRandomItem(){
  // 5% chance of rare diary entry
  const isRare=Math.random()<0.05;
  const drops=['🐀','🐍','🦇','🪳','🐛','🦎'];
  const rareDrops=['💴','💎','👑'];
  const item=isRare?rnd(rareDrops):rnd(drops);
  spawnDrop(item);
  const msg=isRare
    ? `！？小夜叼来了 ${item}——这是从哪来的！！`
    : `小夜得意地叼来了 ${item} 放在你脚边……`;
  addDiary(msg, isRare?'rare':'');
  moodMsg.textContent=msg;
  showThought('(=^▽^=)ﾄﾞｳｿﾞ！');
}

// ── STATS ─────────────────────────────────────────────
function changeStat(k,d){
  state[k]=Math.max(0,Math.min(100,(state[k]||0)+d));
  const el=document.getElementById('bar-'+k);
  if(el)el.style.width=state[k]+'%';
}

// ── EMOJI / DROP SPAWNERS ──────────────────────────────
function spawnEmoji(e){
  const el=document.createElement('div');
  el.className='popup-effect';el.textContent=e;
  const r=catWrap.getBoundingClientRect();
  el.style.left=(r.left+r.width/2-18)+'px';
  el.style.top=(r.top-8)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}
function spawnDrop(e){
  const el=document.createElement('div');
  el.className='drop-item';el.textContent=e;
  const r=catWrap.getBoundingClientRect();
  el.style.left=(r.left+r.width/2-20)+'px';
  el.style.top=(r.top+10)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2100);
}

// ── DIARY ─────────────────────────────────────────────
const diaryList=document.getElementById('diary-list');
let dCount=0;
function addDiary(text,cls=''){
  const t=new Date();
  const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  const li=document.createElement('li');
  li.className='diary-entry'+(cls?' '+cls:'');
  li.innerHTML=`<span class="diary-time">${ts}</span><span>${text}</span>`;
  diaryList.prepend(li);
  if(++dCount>30)diaryList.lastChild?.remove();
}

// ── DECAY ─────────────────────────────────────────────
setInterval(()=>{
  changeStat('hungry',-2);changeStat('happy',-1);
  changeStat('energy',-1);if(state.clean>5)changeStat('clean',-1);
  if(!state.busy){
    if(state.hungry<20){setFace('hungry');showThought(rnd(FACES.hungry));}
    else if(state.affection>=state.maxAff && !state.giftGiven){triggerGift();}
  }
},10000);

// ── INIT ──────────────────────────────────────────────
window.addEventListener('load',()=>{
  init();
  addDiary('小夜出生啦！好奇地看着这个世界 🌟');
  addDiary('小夜打了一个大哈欠，伸了个懒腰 zzz');
  setTimeout(()=>addDiary('小夜用爪子推了推你的手 ♡'),3000);
});
</script>
