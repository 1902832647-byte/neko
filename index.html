<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฅ^•ﻌ•^ฅ 小夜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
:root{
  --cream:#fdf6ec;--pink:#f2a7c3;--pd:#e8789f;
  --lav:#c9b8e8;--mint:#b8e8d4;--dark:#2d2340;
  --sh:rgba(200,150,180,0.22);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:18px;overflow-x:hidden;
  background-image:
    radial-gradient(circle at 20% 20%,rgba(242,167,195,.13) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(201,184,232,.13) 0%,transparent 50%);
}
.deco{position:fixed;pointer-events:none;opacity:.18;animation:flt 6s ease-in-out infinite}
.d1{top:4%;left:4%;font-size:1.1rem}
.d2{top:14%;right:7%;font-size:1rem;animation-delay:1.5s}
.d3{bottom:18%;left:3%;font-size:1rem;animation-delay:3s}
.d4{bottom:9%;right:4%;font-size:1.1rem;animation-delay:4.5s}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

h1{font-size:1.75rem;font-weight:900;color:var(--dark);margin-bottom:2px;letter-spacing:-.5px;text-align:center}
.sub{font-size:.8rem;color:var(--pd);font-weight:800;margin-bottom:14px;letter-spacing:.5px;text-align:center}

/* affection */
.aff-wrap{
  width:100%;max-width:460px;background:white;border-radius:18px;
  padding:9px 15px;margin-bottom:11px;
  box-shadow:0 2px 12px var(--sh);
  display:flex;align-items:center;gap:10px;
}
.aff-label{font-size:.75rem;font-weight:900;color:var(--dark);white-space:nowrap}
.aff-track{flex:1;height:9px;background:#f0e6f0;border-radius:5px;overflow:hidden}
.aff-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#f9c8d8,#e8789f,#c9b8e8);transition:width .5s ease;width:0%}
#aff-hearts{font-size:.9rem;letter-spacing:1px}

/* stats */
.stats{display:flex;gap:8px;margin-bottom:11px;flex-wrap:wrap;justify-content:center}
.stat{background:white;border-radius:18px;padding:5px 12px;
  display:flex;align-items:center;gap:5px;
  box-shadow:0 2px 10px var(--sh);font-size:.75rem;font-weight:800;color:var(--dark)}
.track{width:50px;height:6px;background:#f0e6f0;border-radius:3px;overflow:hidden}
.fill{height:100%;border-radius:3px;transition:width .45s ease}
.fh{background:linear-gradient(90deg,#f2a7c3,#e8789f)}
.ff{background:linear-gradient(90deg,#fdeaa8,#f5c842)}
.fc{background:linear-gradient(90deg,#b8e8d4,#5ecfa0)}
.fe{background:linear-gradient(90deg,#c9b8e8,#9b7fd4)}

/* game world */
.world{width:100%;max-width:460px;background:white;border-radius:26px;padding:14px;
  box-shadow:0 6px 36px var(--sh),0 0 0 3px rgba(242,167,195,.28);margin-bottom:11px}
.room-lbl{font-size:.65rem;font-weight:900;color:var(--pd);text-transform:uppercase;
  letter-spacing:2px;text-align:center;margin-bottom:7px}

#arena{
  width:100%;height:220px;
  background:linear-gradient(180deg,#fce8f5 0%,#fdf0f8 60%,#f8e8e0 100%);
  border-radius:18px;position:relative;overflow:hidden;
  border:2px solid rgba(242,167,195,.32);
  user-select:none;-webkit-user-select:none;
}
.adeco{position:absolute;font-size:1.2rem;pointer-events:none;opacity:.4}

/* cat */
#cat{
  position:absolute;
  font-size:1.6rem;
  line-height:1;
  cursor:pointer;
  white-space:nowrap;
  transition:left .65s cubic-bezier(.34,1.3,.64,1), top .65s cubic-bezier(.34,1.3,.64,1);
  filter:drop-shadow(0 2px 5px rgba(200,130,170,.28));
  display:flex;flex-direction:column;align-items:center;
}

/* cat animations */
@keyframes bob  {0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(2deg)}}
@keyframes wig  {0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-4px) rotate(5deg)}}
@keyframes purr {0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes shk  {0%,100%{transform:rotate(0) scale(1)}20%{transform:rotate(-16deg) scale(1.22)}40%{transform:rotate(16deg) scale(1.26)}60%{transform:rotate(-10deg) scale(1.18)}80%{transform:rotate(10deg) scale(1.1)}}
@keyframes wet  {0%{transform:translateX(0)}25%{transform:translateX(-8px) rotate(-8deg)}75%{transform:translateX(8px) rotate(8deg)}100%{transform:translateX(0)}}

.a-bob  {animation:bob  2s ease-in-out infinite}
.a-walk {animation:wig  .35s ease-in-out infinite}
.a-purr {animation:purr .5s ease-in-out infinite}
.a-shk  {animation:shk  .55s ease forwards}
.a-wet  {animation:wet  .4s ease}

/* thought bubble */
#bubble{
  position:absolute;top:-34px;left:50%;transform:translateX(-50%);
  background:white;border-radius:11px;padding:3px 9px;
  font-size:.62rem;font-weight:900;color:var(--dark);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 2px 8px rgba(0,0,0,.09);border:1.5px solid rgba(242,167,195,.45);
  opacity:0;transition:opacity .25s;
}
#bubble::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:white}
#bubble.on{opacity:1}

#mood{text-align:center;font-size:.78rem;font-weight:800;color:var(--pd);margin-top:9px;min-height:19px}

/* buttons */
.btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:460px;margin-bottom:11px}
.btn{
  border:none;border-radius:17px;padding:13px 8px;
  font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:900;color:var(--dark);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 3px 14px var(--sh);transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;
}
.btn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 6px 18px var(--sh)}
.btn:active{transform:scale(.94)}
.be{font-size:1.2rem}
.b1{background:linear-gradient(135deg,#fde8f0,#fcd0e4)}
.b2{background:linear-gradient(135deg,#fef9e0,#fdeaa8)}
.b3{background:linear-gradient(135deg,#e8f0fe,#c9d8fc)}
.b4{background:linear-gradient(135deg,#e8fef5,#b8e8d4)}
.b5{background:linear-gradient(135deg,#e8f4fe,#b8d8f8);grid-column:1/-1}

/* diary */
.diary{width:100%;max-width:460px;background:white;border-radius:22px;padding:14px;
  box-shadow:0 3px 18px var(--sh);border:2px solid rgba(201,184,232,.28)}
.dtitle{font-size:.88rem;font-weight:900;color:var(--dark);margin-bottom:9px}
#dlist{list-style:none;display:flex;flex-direction:column;gap:5px;
  max-height:190px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--pink) transparent}
#dlist::-webkit-scrollbar{width:3px}
#dlist::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px}
.de{background:var(--cream);border-radius:11px;padding:6px 10px;
  font-size:.72rem;font-weight:700;color:var(--dark);
  display:flex;align-items:flex-start;gap:7px;
  animation:sin .3s cubic-bezier(.34,1.56,.64,1)}
.de.rare{background:linear-gradient(135deg,#fff8e1,#ffeaa0);border-left:3px solid #f5c842}
.de.gift{background:linear-gradient(135deg,#fde8f0,#fcd0e4);border-left:3px solid var(--pd)}
@keyframes sin{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:none}}
.dt{font-size:.62rem;color:var(--pd);white-space:nowrap;margin-top:1px}

/* gift modal */
#gmodal{display:none;position:fixed;inset:0;z-index:500;
  background:rgba(45,35,64,.4);backdrop-filter:blur(5px);
  align-items:center;justify-content:center}
#gmodal.on{display:flex}
.gbox{background:white;border-radius:26px;padding:26px 30px;text-align:center;
  box-shadow:0 18px 55px rgba(200,130,170,.38);
  animation:gin .45s cubic-bezier(.34,1.56,.64,1);max-width:290px}
@keyframes gin{from{transform:scale(.45) rotate(-10deg);opacity:0}to{transform:none;opacity:1}}
.gbox h2{font-size:1.2rem;font-weight:900;color:var(--dark);margin-bottom:5px}
#gitem{font-size:3.2rem;margin:11px 0;display:block;animation:purr .6s ease-in-out infinite}
.gdesc{font-size:.79rem;font-weight:700;color:#999;margin-bottom:16px}
.gclose{background:linear-gradient(135deg,#fde8f0,#fcd0e4);border:none;border-radius:13px;
  padding:9px 22px;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:900;
  color:var(--dark);cursor:pointer;transition:transform .18s}
.gclose:hover{transform:scale(1.05)}

/* floating emoji */
.pop{position:fixed;pointer-events:none;font-size:1.7rem;z-index:900;
  animation:pflt 1s ease forwards}
@keyframes pflt{0%{opacity:1;transform:translateY(0) scale(.4)}50%{opacity:1;transform:translateY(-50px) scale(1.3)}100%{opacity:0;transform:translateY(-85px) scale(.8)}}
.drop{position:fixed;pointer-events:none;font-size:1.9rem;z-index:899;
  animation:dflt 1.8s ease forwards}
@keyframes dflt{0%{opacity:1;transform:translateY(0) scale(.5) rotate(0)}40%{opacity:1;transform:translateY(-35px) scale(1.25) rotate(-15deg)}100%{opacity:0;transform:translateY(30px) scale(.7) rotate(20deg)}}
</style>
</head>
<body>

<div class="deco d1">🌸</div>
<div class="deco d2">⭐</div>
<div class="deco d3">🍓</div>
<div class="deco d4">🌙</div>

<h1>ฅ^•ﻌ•^ฅ 小夜</h1>
<p class="sub">我的颜文字猫咪 · pixel neko</p>

<!-- affection -->
<div class="aff-wrap">
  <div class="aff-label">💝 好感度</div>
  <div class="aff-track"><div class="aff-fill" id="afill"></div></div>
  <div id="aff-hearts">🤍🤍🤍🤍🤍</div>
</div>

<!-- stats -->
<div class="stats">
  <div class="stat">💗<div class="track"><div class="fill fh" id="sh" style="width:80%"></div></div></div>
  <div class="stat">🍣<div class="track"><div class="fill ff" id="sf" style="width:60%"></div></div></div>
  <div class="stat">✨<div class="track"><div class="fill fc" id="sc" style="width:90%"></div></div></div>
  <div class="stat">⚡<div class="track"><div class="fill fe" id="se" style="width:70%"></div></div></div>
</div>

<!-- arena -->
<div class="world">
  <div class="room-lbl">🏠 小夜的小屋</div>
  <div id="arena">
    <span class="adeco" style="left:7px;bottom:20px">🪴</span>
    <span class="adeco" style="right:7px;bottom:20px">🧸</span>
    <span class="adeco" style="left:50%;bottom:16px;transform:translateX(-50%)">🐾</span>
    <div id="cat">
      <div id="bubble"></div>
      <span id="face">(=^･ω･^=)</span>
    </div>
  </div>
  <div id="mood">小夜正在悠闲地四处逛~</div>
</div>

<!-- buttons -->
<div class="btns">
  <button class="btn b1" onclick="act('pet')"><span class="be">🤍</span>摸摸</button>
  <button class="btn b2" onclick="act('feed')"><span class="be">🍣</span>喂饭</button>
  <button class="btn b3" onclick="act('play')"><span class="be">🎀</span>一起玩</button>
  <button class="btn b4" onclick="act('bath')"><span class="be">🛁</span>洗澡澡</button>
  <button class="btn b5" onclick="act('gun')"><span class="be">🔫</span>用水枪滋它一下</button>
</div>

<!-- diary -->
<div class="diary">
  <div class="dtitle">📓 小夜的日记</div>
  <ul id="dlist"></ul>
</div>

<!-- gift modal -->
<div id="gmodal">
  <div class="gbox">
    <h2>🎁 小夜送你礼物！</h2>
    <span id="gitem">🐀</span>
    <div class="gdesc" id="gdesc">小夜骄傲地叼来了东西放在你脚边！</div>
    <button class="gclose" onclick="closeGift()">谢谢小夜！♡</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  STATE  (no busy flag — use cooldown instead)
// ══════════════════════════════════════════════
const S = {
  happy:80, hungry:60, clean:90, energy:70,
  aff:0,          // 0-100
  giftReady:false,// true when aff hits 100
  cooldownUntil:0 // timestamp — ignore clicks before this
};

function isCool(){ return Date.now() >= S.cooldownUntil; }
function setCool(ms){ S.cooldownUntil = Date.now() + ms; }

// ══════════════════════════════════════════════
//  FACES
// ══════════════════════════════════════════════
const F = {
  idle:  ['(=^･ω･^=)','ฅ(^•ﻌ•^ฅ)','(=^‥^=)','(^･o･^)','( ´◔ ω◔`)','(=^-ω-^=)'],
  walk:  ['ε=(=^･ω･^=)','(=^･o･^=)ﾉ','~(=^‥^)/','(=^･ｪ･^=)ﾉ彡'],
  happy: ['(=^▽^=)','(＾•ω•＾)♡','ฅ(≧▽≦)ฅ','(*^ω^*)','(=｀ω´=)♡','(=^ｪ^=)~~♡'],
  purr:  ['(=^‥^=)♡','(≧ω≦)ぐるぐる','ฅ(*ΦωΦ*)ฅ','(=^▽^=)~~♪'],
  feed:  ['( ˙༥˙ )ﾓｸﾞﾓｸﾞ','(=^ｪ^=)♪','(≧ヮ≦)ﾓｸﾞ','(^•ω•^)🐟ﾓｸﾞ'],
  play:  ['ε=ε=ε=(=^･ω･^=)','(=^▽^=)ﾉ🎀','ฅ(^•ω•^ฅ)ﾉ','(=^○○^=)！'],
  bath:  ['(=；ω；=)ﾔﾀﾞ','(≧Дﾐ)ﾔﾀﾞ','(=ＴェＴ=)...','(=｀Дﾐ)ｲﾔｧ！'],
  fluff: ['(=ΦエΦ=)!!','(ΦДΦ)!!','ฅ(ΦωΦ)ฅ!!','(=ＴェＴ=)!!','(ฅ`ω´ฅ)!!'],
  gun:   ['( ･᷄ὢ･᷅ )🔪','(=ΦエΦ=)🔪','(ฅ`ω´ฅ)🔪','ฅ(º ω º ฅ)🔪'],
  angry: ['( ･᷄ὢ･᷅ )','(=｀ω´=)...','(ΦωΦ)ﾌﾝ','(=｀ェ´=)じ'],
  hungry:['(´•ω•`)ﾊﾗﾍﾀ','(=^‥^=)...ぐぅ','( ˙༥˙ )...'],
  gift:  ['(=^▽^=)🎁','(≧ω≦)ﾄﾞｳｿﾞ！','ฅ(^•ﻌ•^ฅ)♡'],
};
const pick = arr => arr[Math.floor(Math.random()*arr.length)];

// ══════════════════════════════════════════════
//  DOM refs
// ══════════════════════════════════════════════
const arena  = document.getElementById('arena');
const catEl  = document.getElementById('cat');
const faceEl = document.getElementById('face');
const bubble = document.getElementById('bubble');
const moodEl = document.getElementById('mood');

// ══════════════════════════════════════════════
//  FACE + ANIMATION helpers
// ══════════════════════════════════════════════
function setFace(key){ faceEl.textContent = pick(F[key]||F.idle); }

let animTimer = null;
function setAnim(cls, dur){
  // clear previous
  ['a-bob','a-walk','a-purr','a-shk','a-wet'].forEach(c=>faceEl.classList.remove(c));
  if(cls) faceEl.classList.add(cls);
  if(animTimer) clearTimeout(animTimer);
  if(dur){
    animTimer = setTimeout(()=>{
      ['a-bob','a-walk','a-purr','a-shk','a-wet'].forEach(c=>faceEl.classList.remove(c));
      faceEl.classList.add('a-bob');
    }, dur);
  }
}

let bubTimer = null;
function think(txt, ms=2200){
  bubble.textContent = txt;
  bubble.classList.add('on');
  if(bubTimer) clearTimeout(bubTimer);
  bubTimer = setTimeout(()=>bubble.classList.remove('on'), ms);
}

function glow(on){
  faceEl.style.textShadow = on
    ? '0 0 10px rgba(249,168,200,.9),2px 2px 0 rgba(249,168,200,.5)'
    : '';
}

// ══════════════════════════════════════════════
//  CAT POSITION
// ══════════════════════════════════════════════
let catX=0, catY=0;

function snapCenter(){
  catX = arena.clientWidth/2  - catEl.offsetWidth/2;
  catY = arena.clientHeight/2 - catEl.offsetHeight/2;
  catEl.style.left = catX+'px';
  catEl.style.top  = catY+'px';
}

function moveCat(){
  const pad=10, cw=catEl.offsetWidth||70, ch=catEl.offsetHeight||40;
  const maxX = arena.clientWidth  - cw - pad;
  const maxY = arena.clientHeight - ch - pad - 15; // keep off floor deco
  const nx = pad + Math.random()*maxX;
  const ny = pad + Math.random()*maxY;
  // flip
  faceEl.style.transform = nx < catX ? 'scaleX(-1)' : 'scaleX(1)';
  catX=nx; catY=ny;
  catEl.style.left = nx+'px';
  catEl.style.top  = ny+'px';
  setFace('walk');
  setAnim('a-walk', 680);
  setTimeout(()=>setFace('idle'), 700);
}

// wander loop
let wanderTimer = null;
function scheduleWander(){
  if(wanderTimer) clearTimeout(wanderTimer);
  const delay = 2200 + Math.random()*2000;
  wanderTimer = setTimeout(()=>{
    moveCat();
    scheduleWander();
  }, delay);
}

// ══════════════════════════════════════════════
//  AFFECTION
// ══════════════════════════════════════════════
function changeAff(d){
  S.aff = Math.max(0, Math.min(100, S.aff+d));
  document.getElementById('afill').style.width = S.aff+'%';
  const n = Math.round(S.aff/20);
  document.getElementById('aff-hearts').textContent = '💗'.repeat(n)+'🤍'.repeat(5-n);
  if(S.aff>=100 && !S.giftReady){
    S.giftReady = true;
    setTimeout(triggerGift, 600);
  }
}

// ══════════════════════════════════════════════
//  STATS
// ══════════════════════════════════════════════
function setStat(k,v){
  const map={happy:'sh',hungry:'sf',clean:'sc',energy:'se'};
  S[k] = Math.max(0,Math.min(100, S[k]+v));
  const el = document.getElementById(map[k]);
  if(el) el.style.width = S[k]+'%';
}

// ══════════════════════════════════════════════
//  CLICK CAT
// ══════════════════════════════════════════════
catEl.addEventListener('click', e=>{
  e.stopPropagation();
  if(!isCool()) return;
  setCool(1200);

  if(Math.random()<0.2){
    // FLUFF
    setFace('fluff'); setAnim('a-shk', 560);
    think('!!(ΦДΦ)!!');
    setStat('happy',-5); changeAff(-10);
    diary('小夜突然炸毛，蓬蓬地跑开了 💨（好感↓）');
    moodEl.textContent='小夜炸毛啦！！(ΦДΦ)';
    spawn('💥');
    setTimeout(()=>{
      moveCat();
      scheduleWander();
      moodEl.textContent='小夜冷静下来了… 还是有点不爽';
      setFace('angry');
      setTimeout(()=>setFace('idle'), 1800);
    }, 700);
  } else {
    const bubs=['nya~','♡','purr...','mew!','zzz~','(=^ω^=)','ふにゃ~','にゃ！'];
    think(pick(bubs));
    setFace('purr'); setAnim('a-purr', 1100);
    glow(true); setTimeout(()=>glow(false),1100);
    setStat('happy',4); changeAff(4);
    diary('小夜被戳了一下，咕噜咕噜地叫起来 🐾');
    setTimeout(()=>setFace('idle'), 1100);
  }
});

// ══════════════════════════════════════════════
//  ACTION BUTTONS
// ══════════════════════════════════════════════
const MSGS={
  pet:  ['小夜咕噜咕噜地叫起来 ♡','好舒服～（蹭蹭）','小夜的尾巴翘得高高的~','小夜蹭了蹭你的手背 ♡'],
  feed: ['小夜把食物吃得干干净净！( ˙༥˙ )ﾓｸﾞﾓｸﾞ','喵～好好吃！最爱吃鱼了！','小夜吃饱了，打了个小嗝~ ♡','( ˙༥˙ )ﾓｸﾞﾓｸﾞ……吃完了！'],
  play: ['小夜扑向了小毛球！','小夜追着蝴蝶结跑来跑去！','哇好好玩！（蹦蹦跳跳）','小夜把玩具叼回来了！'],
  bath: ['小夜洗完澡，现在香喷喷的！','哼哼～（勉强接受了洗澡）','洗完澡小夜毛发亮亮的~','(=；ω；=)ﾔﾀﾞ……洗好了'],
  gun:  ['小夜被水枪滋了一下！！','水！！小夜炸毛了！','小夜：你完了。( ･᷄ὢ･᷅ )🔪','！？( ･᷄ὢ･᷅ )🔪记住你了！'],
};
const EMOJ={pet:'💗',feed:'🍣',play:'🎀',bath:'🫧',gun:'💦'};

function act(type){
  if(!isCool()) return;

  const msgs=MSGS[type];
  const msg=pick(msgs);
  moodEl.textContent=msg;
  diary(msg);
  spawn(EMOJ[type]);

  if(type==='pet'){
    setCool(1300);
    setFace('purr'); setAnim('a-purr',1200);
    think('♡'); glow(true); setTimeout(()=>glow(false),1200);
    setStat('happy',+12); setStat('energy',-2); changeAff(+8);
    setTimeout(()=>setFace('idle'),1200);

  }else if(type==='feed'){
    setCool(1400);
    setFace('feed'); setAnim('a-purr',1300);
    think('( ˙༥˙ )ﾓｸﾞ'); glow(true); setTimeout(()=>glow(false),1300);
    setStat('hungry',+20); setStat('happy',+5); setStat('energy',+8); changeAff(+6);
    if(Math.random()<0.15) setTimeout(dropItem,700);
    setTimeout(()=>setFace('idle'),1300);

  }else if(type==='play'){
    setCool(1400);
    setFace('play'); setAnim('a-walk',1300);
    think('🎀');
    setStat('happy',+15); setStat('energy',-10); setStat('hungry',-8); changeAff(+10);
    if(Math.random()<0.1) setTimeout(dropItem,700);
    setTimeout(()=>setFace('idle'),1300);

  }else if(type==='bath'){
    setCool(1500);
    setFace('bath'); setAnim('a-shk',600);
    think('ﾔﾀﾞ(=；ω；=)');
    setStat('clean',+25); setStat('happy',-5); changeAff(+2);
    setTimeout(()=>{ setFace('angry'); setTimeout(()=>setFace('idle'),1500); },700);

  }else if(type==='gun'){
    setCool(1800);
    setFace('gun'); setAnim('a-wet',400);
    think('( ･᷄ὢ･᷅ )🔪');
    setStat('happy',-15); changeAff(-18);
    setTimeout(()=>{
      setAnim('a-shk',550);
      setTimeout(()=>{
        moveCat(); scheduleWander();
        moodEl.textContent='小夜非常生气！！（好感↓↓）';
        setFace('angry');
        setTimeout(()=>setFace('idle'),2000);
      },600);
    },450);
  }
}

// ══════════════════════════════════════════════
//  DROP ITEM
// ══════════════════════════════════════════════
const DROPS_COMMON=['🐀','🐍','🦇','🪳','🐛','🦎','🐾'];
const DROPS_RARE  =['💴','💎','👑','🍀'];
const DROP_MSGS={
  '🐀':'小夜骄傲地叼来了一只老鼠放在你脚边……',
  '🐍':'小夜带来了一条蛇，尾巴还在动……',
  '🦇':'小夜送来了一只蝙蝠！',
  '🪳':'小夜推来了一只大蟑螂……',
  '🐛':'小夜送来了一条毛毛虫，感觉很得意',
  '🦎':'小夜叼着蜥蜴跑来，骄傲地放在你面前！',
  '🐾':'小夜留下了一个肉垫印！',
  '💴':'！？小夜不知道从哪叼来了钱！！',
  '💎':'！？小夜叼来了一颗钻石——这是哪来的？！',
  '👑':'！？小夜叼来了一顶王冠……猫猫是国王！',
  '🍀':'小夜叼来了四叶草，今天有好运！',
};

function dropItem(){
  const isRare = Math.random()<0.05;
  const item = isRare ? pick(DROPS_RARE) : pick(DROPS_COMMON);
  const dmsg = DROP_MSGS[item]||'小夜叼来了东西！';
  spawnDrop(item);
  think('(=^▽^=)ﾄﾞｳｿﾞ！');
  moodEl.textContent = dmsg;
  diary(dmsg, isRare?'rare':'');
}

// ══════════════════════════════════════════════
//  GIFT (aff maxed)
// ══════════════════════════════════════════════
const GIFTS=[
  {item:'🐀',desc:'小夜骄傲地叼来了一只老鼠，放在你脚边……',rare:false},
  {item:'🐍',desc:'小夜带来了一条蛇，还在动……',rare:false},
  {item:'🦇',desc:'小夜送来了一只蝙蝠！',rare:false},
  {item:'🪳',desc:'小夜推来了一只大蟑螂……',rare:false},
  {item:'🐛',desc:'小夜送来了毛毛虫，感觉很得意',rare:false},
  {item:'💴',desc:'！？小夜叼来了钱！！稀有！！',rare:true},
  {item:'💎',desc:'！？小夜叼来了钻石——这是哪来的？！',rare:true},
  {item:'👑',desc:'！？小夜叼来了王冠！猫猫是国王！',rare:true},
];

function triggerGift(){
  setFace('gift'); setAnim('a-purr',1400);
  moodEl.textContent='小夜跑过来，在你脚边放下了什么……';
  think('(=^▽^=)🎁');
  let pool = Math.random()<0.05 ? GIFTS.filter(g=>g.rare) : GIFTS.filter(g=>!g.rare);
  if(!pool.length) pool=GIFTS;
  const g=pick(pool);
  setTimeout(()=>{
    document.getElementById('gitem').textContent=g.item;
    document.getElementById('gdesc').textContent=g.desc;
    document.getElementById('gmodal').classList.add('on');
    diary(g.desc+' '+g.item,'gift');
    if(g.rare) diary('（✨稀有礼物！！）','rare');
  },1300);
}

function closeGift(){
  document.getElementById('gmodal').classList.remove('on');
  S.giftReady=false;
  S.aff=70; changeAff(0); // reset a bit, let them fill again
  setFace('idle'); setAnim('a-bob',0);
  moodEl.textContent='小夜满足地打了个哈欠~';
}

// ══════════════════════════════════════════════
//  SPAWN helpers
// ══════════════════════════════════════════════
function spawn(e){
  const el=document.createElement('div');
  el.className='pop'; el.textContent=e;
  const r=catEl.getBoundingClientRect();
  el.style.left=(r.left+r.width/2-16)+'px';
  el.style.top=(r.top-6)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}
function spawnDrop(e){
  const el=document.createElement('div');
  el.className='drop'; el.textContent=e;
  const r=catEl.getBoundingClientRect();
  el.style.left=(r.left+r.width/2-18)+'px';
  el.style.top=(r.top+8)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1900);
}

// ══════════════════════════════════════════════
//  DIARY
// ══════════════════════════════════════════════
const dlist=document.getElementById('dlist');
let dcount=0;
function diary(text,cls=''){
  const t=new Date();
  const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  const li=document.createElement('li');
  li.className='de'+(cls?' '+cls:'');
  li.innerHTML=`<span class="dt">${ts}</span><span>${text}</span>`;
  dlist.prepend(li);
  if(++dcount>30) dlist.lastChild?.remove();
}

// ══════════════════════════════════════════════
//  DECAY (every 12s)
// ══════════════════════════════════════════════
setInterval(()=>{
  setStat('hungry',-2); setStat('happy',-1);
  setStat('energy',-1); if(S.clean>5) setStat('clean',-1);
  if(S.hungry<20 && isCool()){
    setFace('hungry');
    think(pick(F.hungry));
    moodEl.textContent='小夜肚子饿了……（快来喂它！）';
  }
},12000);

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
window.addEventListener('load',()=>{
  snapCenter();
  setFace('idle');
  setAnim('a-bob', 0);
  faceEl.classList.add('a-bob');
  changeAff(0);
  scheduleWander();

  diary('小夜出生啦！好奇地看着这个世界 🌟');
  diary('小夜打了一个大哈欠，伸了个懒腰 zzz');
  setTimeout(()=>diary('小夜用爪子推了推你的手 ♡'), 3000);
});
</script>
